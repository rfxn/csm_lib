# csf.conf — mock CSF config for csm_lib tests
# SECTION:Port Settings
TCP_IN = "22,80,443"
TCP_OUT = "80,443,25"
UDP_IN = "53"
UDP_OUT = "53,123"
# SECTION:Network
ETH_DEVICE = "eth0"
ETH_DEVICE_SKIP = "lo"
IPV6 = "1"
DOCKER = "0"
# SECTION:Protection
SYNFLOOD = "1"
SYNFLOOD_RATE = "100/s"
SYNFLOOD_BURST = "150"
PACKET_FILTER = "1"
ICMP_IN_RATE = "1/s"
CONNLIMIT = "22;5,80;20"
PORTFLOOD = "22;tcp;5;300"
UDPFLOOD = "1"
UDPFLOOD_LIMIT = "100/s"
CT_LIMIT = "300"
CC_DENY = "CN,RU"
CC_ALLOW = ""
# SECTION:Firewall
TESTING = "0"
FASTSTART = "1"
DROP = "DROP"
DROP_LOGGING = "1"
SMTP_BLOCK = "1"
SMTP_ALLOWUSER = "root"
DENY_IP_LIMIT = "200"
LF_IPSET = "1"
WAITLOCK = "60"
GLOBAL_ALLOW = ""
GLOBAL_DENY = ""
VERSION = "14.20"
# SECTION:LFD Settings
LF_SSHD = "5"
LF_FTPD = "10"
LF_SMTPAUTH = "5"
LF_POP3D = "10"
LF_IMAPD = "10"
LF_TRIGGER_PERM = "3600"
LF_ALERT_TO = "admin@example.com"
LF_PERMBLOCK_COUNT = "5"
LF_PERMBLOCK_INTERVAL = "86400"
LF_NETBLOCK = "0"
LF_SELECT = ""
LF_CPANEL = "5"
LF_MODSEC = "5"
LF_DIRECTADMIN = "10"
# SECTION:Unmapped vars for normalization testing
RESTRICT_SYSLOG = "3"
MESSENGER = "0"
CLUSTER_SENDTO = ""
# Shell-style (no spaces around =) for parser testing
SHELL_VAR="shell_value"
SHELL_QUOTED='single_quoted'
